<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AGV Load Detector</title>
    <style>
        :root {
            --primary: #00ff88;
            --danger: #ff4444;
            --info: #00ccff;
            --bg: #121212;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #video-preview {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 400px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 20px;
            color: #fff;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 12px;
            box-sizing: border-box;
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; }
        .status-label { font-size: 14px; color: #aaa; text-transform: uppercase; }
        .status-value { font-size: 20px; font-weight: bold; }
        .detection-card {
            background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .detection-value { font-size: 24px; color: var(--primary); font-family: monospace; }
        .coords { color: var(--info); font-family: monospace; font-size: 16px; margin-top: 5px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input, select {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 10px; border-radius: 8px; font-size: 16px;
            width: 100%; box-sizing: border-box;
        }
        button {
            border: none; border-radius: 10px; padding: 15px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s; color: #fff;
        }
        button:active { opacity: 0.6; }
        .btn-start { background: var(--primary); color: #000; }
        .btn-stop { background: var(--danger); }
        .btn-clear { background: #444; }
        .btn-export { background: var(--info); }
        .btn-origin { background: #6b4c9a; }
        
        #roi-guide {
            position: absolute;
            top: 30%; left: 20%; width: 60%; height: 30%;
            border: 2px dashed var(--primary);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 5;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <video id="video-preview" autoplay playsinline muted></video>
    <div id="roi-guide"></div>
    <canvas id="proc-canvas" class="hidden"></canvas>

    <div class="overlay">
        <div class="status-row">
            <div>
                <div class="status-label">Recording Status</div>
                <div id="recording-status" class="status-value">STOPPED</div>
            </div>
            <button class="btn-origin" id="btn-set-origin">SET ORIGIN (0,0)</button>
        </div>

        <div class="detection-card">
            <div class="status-label">Live Detection</div>
            <div id="detection-result" class="detection-value">WAITING...</div>
            <div id="coord-display" class="coords">X: 0.00, Y: 0.00</div>
        </div>

        <div class="controls">
            <input type="text" id="agv-id" value="AGV_01" placeholder="AGV ID">
            <select id="interval-select">
                <option value="1000">Interval: 1s</option>
                <option value="2000">Interval: 2s</option>
                <option value="5000">Interval: 5s</option>
                <option value="10000">Interval: 10s</option>
            </select>
            <button class="btn-start" id="btn-start">START</button>
            <button class="btn-stop" id="btn-stop">STOP</button>
            <button class="btn-clear" id="btn-clear">CLEAR DATA</button>
            <button class="btn-export" id="btn-export">EXPORT CSV</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const recordingStatus = document.getElementById('recording-status');
        const detectionResult = document.getElementById('detection-result');
        const coordDisplay = document.getElementById('coord-display');
        
        let isRecording = false;
        let samplingTimer = null;
        let lastFrameData = null;
        let logs = [];
        let smoothingBuffer = [];
        
        // Coords Tracking
        let curX = 0, curY = 0, velX = 0, velY = 0;
        let lastMotionTime = Date.now();

        // Config
        const ROI_RECT = { x: 0.2, y: 0.3, w: 0.6, h: 0.3 };
        const PIXEL_DIFF_THRESHOLD = 35;
        const CHANGE_RATIO_THRESHOLD = 0.08;
        const SMOOTHING_SIZE = 5;

        // Start Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 },
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Cannot access camera: " + err.message);
            }
        }

        // Motion Tracking (Needs user gesture for iOS 13+)
        function initMotion() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }

        function handleMotion(event) {
            const now = Date.now();
            const dt = (now - lastMotionTime) / 1000;
            lastMotionTime = now;

            const accel = event.acceleration;
            if (!accel || accel.x === null) return;

            // v = u + at
            velX += accel.x * dt;
            velY += accel.y * dt;
            // s = s0 + vt
            curX += velX * dt;
            curY += velY * dt;
        }

        // Processing Logic
        function processFrame() {
            if (!video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // Extract ROI
            const x = ROI_RECT.x * canvas.width;
            const y = ROI_RECT.y * canvas.height;
            const w = ROI_RECT.w * canvas.width;
            const h = ROI_RECT.h * canvas.height;
            
            const imageData = ctx.getImageData(x, y, w, h);
            const pixels = imageData.data;
            const grayPixels = new Uint8Array(w * h);

            // Convert to grayscale (Luminance)
            for (let i = 0; i < pixels.length; i += 4) {
                grayPixels[i/4] = pixels[i] * 0.3 + pixels[i+1] * 0.59 + pixels[i+2] * 0.11;
            }

            if (lastFrameData) {
                let diffCount = 0;
                for (let i = 0; i < grayPixels.length; i++) {
                    if (Math.abs(grayPixels[i] - lastFrameData[i]) > PIXEL_DIFF_THRESHOLD) {
                        diffCount++;
                    }
                }

                const ratio = diffCount / (w * h);
                const isLoaded = ratio > CHANGE_RATIO_THRESHOLD;

                // Smoothing
                smoothingBuffer.push(isLoaded);
                if (smoothingBuffer.length > SMOOTHING_SIZE) smoothingBuffer.shift();
                const smoothIsLoaded = smoothingBuffer.filter(v => v).length > (smoothingBuffer.length / 2);
                const confidence = Math.min(1.0, ratio / (CHANGE_RATIO_THRESHOLD * 2));

                // Update UI
                detectionResult.innerText = `${smoothIsLoaded ? 'LOAD' : 'EMPTY'} (${(confidence * 100).toFixed(0)}%)`;
                detectionResult.style.color = smoothIsLoaded ? 'var(--primary)' : '#ffcc00';
                coordDisplay.innerText = `X: ${curX.toFixed(2)}, Y: ${curY.toFixed(2)}`;

                // Log
                if (isRecording) {
                    logs.push({
                        time: new Date().toISOString(),
                        id: document.getElementById('agv-id').value,
                        status: smoothIsLoaded ? 1 : 0,
                        conf: confidence.toFixed(2),
                        ratio: ratio.toFixed(4),
                        x: curX.toFixed(2),
                        y: curY.toFixed(2)
                    });
                }
            }

            lastFrameData = grayPixels;
        }

        // Controls
        document.getElementById('btn-start').onclick = () => {
            initMotion(); // Request sensor on first click
            isRecording = true;
            recordingStatus.innerText = "RECORDING";
            recordingStatus.style.color = "var(--primary)";
            smoothingBuffer = [];
            const interval = parseInt(document.getElementById('interval-select').value);
            samplingTimer = setInterval(processFrame, interval);
        };

        document.getElementById('btn-stop').onclick = () => {
            isRecording = false;
            recordingStatus.innerText = "STOPPED";
            recordingStatus.style.color = "#fff";
            clearInterval(samplingTimer);
        };

        document.getElementById('btn-set-origin').onclick = () => {
            curX = 0; curY = 0; velX = 0; velY = 0;
            coordDisplay.innerText = `X: 0.00, Y: 0.00`;
        };

        document.getElementById('btn-clear').onclick = () => {
            logs = [];
            alert("Logs cleared");
        };

        document.getElementById('btn-export').onclick = () => {
            if (logs.length === 0) { alert("No data to export"); return; }
            let csv = "timestamp_iso8601,agv_id,load_flag,confidence,change_ratio,coord_x,coord_y\n";
            logs.forEach(l => {
                csv += `${l.time},${l.id},${l.status},${l.conf},${l.ratio},${l.x},${l.y}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `agv_log_${Date.now()}.csv`;
            a.click();
        };

        initCamera();
    </script>
</body>
</html>
