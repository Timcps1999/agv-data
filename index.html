<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AGV Load Detector</title>
    <style>
        :root {
            --primary: #00ff88;
            --danger: #ff4444;
            --info: #00ccff;
            --bg: #121212;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 400px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 20px;
            color: #fff;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-label {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
        }

        .status-value {
            font-size: 20px;
            font-weight: bold;
        }

        .detection-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detection-value {
            font-size: 24px;
            color: var(--primary);
            font-family: monospace;
        }

        .coords {
            color: var(--info);
            font-family: monospace;
            font-size: 16px;
            margin-top: 5px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        input,
        select {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }

        button:active {
            opacity: 0.6;
        }

        .btn-start {
            background: var(--primary);
            color: #000;
        }

        .btn-stop {
            background: var(--danger);
        }

        .btn-clear {
            background: #444;
        }

        .btn-export {
            background: var(--info);
        }

        .btn-origin {
            background: #6b4c9a;
        }

        #roi-guide {
            position: absolute;
            top: 30%;
            left: 20%;
            width: 60%;
            height: 30%;
            border: 2px dashed var(--primary);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 5;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <video id="video-preview" autoplay playsinline muted></video>
    <div id="roi-guide"></div>
    <canvas id="proc-canvas" class="hidden"></canvas>

    <div class="overlay">
        <div class="status-row">
            <div>
                <div class="status-label">Recording Status</div>
                <div id="recording-status" class="status-value">STOPPED</div>
            </div>
            <div style="text-align: right;">
                <div class="status-label">Sensors</div>
                <div id="sensor-status" class="status-value" style="color: var(--danger); font-size: 14px;">OFF</div>
            </div>
        </div>
        <button class="btn-origin" id="btn-set-origin" style="width: 100%; margin-top: 5px;">RESET ORIGIN (ZERO GYRO)</button>

        <div class="detection-card">
            <div class="status-label">Live Detection</div>
            <div id="detection-result" class="detection-value">WAITING...</div>
            <div id="coord-display" class="coords">X: 0.00, Y: 0.00</div>
        </div>

        <div class="controls">
            <input type="text" id="agv-id" value="AGV_01" placeholder="AGV ID">
            <select id="interval-select">
                <option value="1000">Interval: 1s</option>
                <option value="2000">Interval: 2s</option>
                <option value="5000">Interval: 5s</option>
                <option value="10000">Interval: 10s</option>
            </select>
            <button class="btn-start" id="btn-start">START</button>
            <button class="btn-stop" id="btn-stop">STOP</button>
            <button class="btn-clear" id="btn-clear">CLEAR DATA</button>
            <button class="btn-export" id="btn-export">EXPORT CSV</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const recordingStatus = document.getElementById('recording-status');
        const sensorStatus = document.getElementById('sensor-status');
        const detectionResult = document.getElementById('detection-result');
        const coordDisplay = document.getElementById('coord-display');

        let isRecording = false;
        let lastLogTime = 0;
        let lastFrameTime = 0;
        let lastFrameData = null;
        let logs = [];

        // Coords Tracking
        let curX = 0, curY = 0, velX = 0, velY = 0;
        let lastMotionTime = Date.now();
        let sensorActive = false;
        
        // Calibration
        let biasX = 0, biasY = 0;
        let biasGx = 0, biasGy = 0, biasGz = 9.8;
        let calibrationCount = 0;
        const CALIBRATION_LIMIT = 60; // ~1 second at 60Hz

        // Config
        const ROI_RECT = { x: 0.2, y: 0.3, w: 0.6, h: 0.3 };
        const PIXEL_DIFF_THRESHOLD = 35;
        const CHANGE_RATIO_THRESHOLD = 0.30;
        const ACCEL_DEADZONE = 0.03; // Even more sensitive with bias removal
        const VEL_DAMPING = 0.95; 

        let lastAvgGray = -1;
        let isLoadedState = false;
        let currentStdDev = 0;

        // Thresholds for Texture Detection
        const SD_EMPTY_THRESHOLD = 18;
        const SD_LOADED_THRESHOLD = 10;

        // Start Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 1280, height: 720 },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(mainLoop);
                };
            } catch (err) {
                alert("Cannot access camera. Please check permissions.");
                console.error(err);
            }
        }

        // Motion Tracking (Needs user gesture for iOS 13+)
        function initMotion() {
            if (sensorActive) return;

            const handleMotionWrapper = (e) => {
                handleMotion(e);
                sensorActive = true;
            };

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotionWrapper);
                        } else {
                            alert("Sensor Permission Denied.");
                        }
                    })
                    .catch(e => {
                        console.error("Motion Permission Error:", e);
                    });
            } else {
                window.addEventListener('devicemotion', handleMotionWrapper);
            }
        }

        function handleMotion(event) {
            const now = Date.now();
            const dt = (now - lastMotionTime) / 1000;
            lastMotionTime = now;

            if (dt <= 0 || dt > 0.5) return;

            const accel = event.acceleration; 
            const grav = event.accelerationIncludingGravity;
            const rot = event.rotationRate;

            // Ensure we have at least one working sensor
            if (!grav || grav.x === null) {
                sensorStatus.innerText = "WAITING FOR SENSOR...";
                return;
            }

            // Stable Gravity estimation (Low-pass)
            biasGx = (biasGx * 0.95) + (grav.x * 0.05);
            biasGy = (biasGy * 0.95) + (grav.y * 0.05);
            biasGz = (biasGz * 0.95) + (grav.z * 0.05);

            // Manual Linear Accel Calculation (Fallback if event.acceleration is null)
            let lax = (accel && accel.x !== null) ? accel.x : (grav.x - biasGx);
            let lay = (accel && accel.y !== null) ? accel.y : (grav.y - biasGy);
            let laz = (accel && accel.z !== null) ? accel.z : (grav.z - biasGz);

            // Normalize Gravity Vector (Down direction)
            let gMag = Math.sqrt(biasGx**2 + biasGy**2 + biasGz**2);
            let nx = biasGx / gMag, ny = biasGy / gMag, nz = biasGz / gMag;

            // Calibration (Quiet phase - fine tuning)
            if (calibrationCount < CALIBRATION_LIMIT) {
                calibrationCount++;
                sensorStatus.innerText = `CALIBRATING ${Math.round(calibrationCount/CALIBRATION_LIMIT*100)}%`;
                sensorStatus.style.color = "#ffcc00";
                return;
            }

            sensorStatus.innerText = "ACTIVE";
            sensorStatus.style.color = "var(--primary)";

            // 1. Project 3D Acceleration to Horizontal Plane
            let dot = lax*nx + lay*ny + laz*nz;
            let hx = lax - dot*nx;
            let hy = lay - dot*ny;
            let hz = laz - dot*nz;

            // 2. Define Directions
            // Phone Top (0, 1, 0)
            let fDot = ny; // (0,1,0) dot (nx, ny, nz)
            let fx = 0 - fDot*nx, fy = 1 - fDot*ny, fz = 0 - fDot*nz;
            let fMag = Math.sqrt(fx*fx + fy*fy + fz*fz);

            let finalF = 0, finalR = 0;
            if (fMag > 0.05) {
                // Forward Unit
                let ux = fx/fMag, uy = fy/fMag, uz = fz/fMag;
                // Right Unit (Cross: Forward x Down)
                let rx = uy*nz - uz*ny, ry = uz*nx - ux*nz, rz = ux*ny - uy*nx;
                
                finalF = hx*ux + hy*uy + hz*uz;
                finalR = hx*rx + hy*ry + hz*rz;
            } else {
                // If phone is vertical (Top is Up), use Screen-Forward (Z)
                finalF = laz; 
                finalR = lax;
            }

            // 3. Rotation Suppression
            if (rot && (Math.abs(rot.alpha) > 25 || Math.abs(rot.beta) > 25 || Math.abs(rot.gamma) > 25)) {
                finalF = 0; finalR = 0;
            }

            // 4. Integrate with Deadzone
            const deadzone = 0.035;
            const af = Math.abs(finalF) > deadzone ? finalF : 0;
            const ar = Math.abs(finalR) > deadzone ? finalR : 0;

            const damping = 0.965; // Slightly less damping
            velY = (velY + af * dt) * damping;
            velX = (velX + ar * dt) * damping;

            curY += velY * dt;
            curX += velX * dt;

            // Brake logic
            if (af === 0 && ar === 0) {
                if (Math.abs(velY) < 0.005) velY = 0;
                if (Math.abs(velX) < 0.005) velX = 0;
            }

            window.lastRawAccel = { x: finalR, y: finalF, lx: lax, ly: lay };
        }

        // Processing Logic
        function processFrame() {
            if (!video.videoWidth || video.paused) return;

            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
            ctx.drawImage(video, 0, 0);

            const x = ROI_RECT.x * canvas.width;
            const y = ROI_RECT.y * canvas.height;
            const w = ROI_RECT.w * canvas.width;
            const h = ROI_RECT.h * canvas.height;

            const imageData = ctx.getImageData(x, y, w, h);
            const pixels = imageData.data;

            let totalGray = 0;
            let totalGraySq = 0;
            const pixelCount = w * h;
            const grayPixels = new Uint8Array(pixelCount);

            for (let i = 0; i < pixels.length; i += 4) {
                const g = pixels[i] * 0.3 + pixels[i + 1] * 0.59 + pixels[i + 2] * 0.11;
                grayPixels[i / 4] = g;
                totalGray += g;
                totalGraySq += g * g;
            }

            const currentAvgGray = totalGray / pixelCount;
            const variance = (totalGraySq / pixelCount) - (currentAvgGray * currentAvgGray);
            currentStdDev = Math.sqrt(Math.max(0, variance));

            // State Logic
            if (currentStdDev < SD_LOADED_THRESHOLD) {
                isLoadedState = true;
            } else if (currentStdDev > SD_EMPTY_THRESHOLD) {
                isLoadedState = false;
            }

            // Jump Detection
            if (lastAvgGray !== -1) {
                const jump = Math.abs(currentAvgGray - lastAvgGray);
                if (jump > (255 * CHANGE_RATIO_THRESHOLD)) {
                    isLoadedState = !isLoadedState;
                }
            }

            // Update Prediction UI
            const statusText = isLoadedState ? 'LOADED' : 'EMPTY';
            detectionResult.innerText = statusText;
            detectionResult.style.color = isLoadedState ? 'var(--primary)' : '#ffcc00';

            // Logging
            if (isRecording) {
                const now = Date.now();
                const interval = parseInt(document.getElementById('interval-select').value);
                if (now - lastLogTime >= interval) {
                    logs.push({
                        time: new Date().toISOString(),
                        id: document.getElementById('agv-id').value,
                        status: isLoadedState ? 1 : 0,
                        avg_gray: currentAvgGray.toFixed(1),
                        std_dev: currentStdDev.toFixed(1),
                        x: curX.toFixed(4),
                        y: curY.toFixed(4)
                    });
                    lastLogTime = now;
                }
            }

            lastAvgGray = currentAvgGray;
            lastFrameData = grayPixels;
        }

        // Main Loop for UI and High-Freq Updates
        function mainLoop(timestamp) {
            // Update Coords UI at maximum frame rate
            let debugInfo = "";
            if (window.lastRawAccel) {
                const la = ` | L-ACC -> X:${window.lastRawAccel.lx.toFixed(2)} Y:${window.lastRawAccel.ly.toFixed(2)}`;
                debugInfo = `<br><span style="font-size:10px; color:#888;">PROJ -> X:${window.lastRawAccel.x.toFixed(2)}, Y:${window.lastRawAccel.y.toFixed(2)}${la}</span>`;
            }

            coordDisplay.innerHTML = `X: ${curX.toFixed(2)}, Y: ${curY.toFixed(2)} | SD: ${currentStdDev.toFixed(1)}${debugInfo}`;

            // Process detection at a fixed rate (approx 10 FPS) for visual feedback
            if (timestamp - lastFrameTime > 100) {
                processFrame();
                lastFrameTime = timestamp;
            }

            requestAnimationFrame(mainLoop);
        }

        // Controls
        document.getElementById('btn-start').onclick = () => {
            initMotion();
            isRecording = true;
            lastLogTime = 0; // Trigger immediate first log
            recordingStatus.innerText = "RECORDING";
            recordingStatus.style.color = "var(--primary)";
        };

        document.getElementById('btn-stop').onclick = () => {
            isRecording = false;
            recordingStatus.innerText = "STOPPED";
            recordingStatus.style.color = "#fff";
        };

        document.getElementById('btn-set-origin').onclick = () => {
            curX = 0; curY = 0; velX = 0; velY = 0;
            // Trigger re-calibration
            biasX = 0; biasY = 0; calibrationCount = 0;
            alert("Coordinates Reset & Re-calibrating Bias...");
        };

        document.getElementById('btn-clear').onclick = () => {
            logs = [];
            alert("Logs cleared");
        };

        document.getElementById('btn-export').onclick = () => {
            if (logs.length === 0) { alert("No data to export"); return; }
            let csv = "timestamp_iso8601,agv_id,load_flag,avg_gray,std_dev,coord_x,coord_y\n";
            logs.forEach(l => {
                csv += `${l.time},${l.id},${l.status},${l.avg_gray},${l.std_dev},${l.x},${l.y}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `agv_log_${Date.now()}.csv`;
            a.click();
        };

        initCamera();
    </script>
</body>

</html>
