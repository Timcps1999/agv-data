<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AGV Load Detector</title>
    <style>
        :root {
            --primary: #00ff88;
            --danger: #ff4444;
            --info: #00ccff;
            --bg: #121212;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 400px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 20px;
            color: #fff;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-label {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
        }

        .status-value {
            font-size: 20px;
            font-weight: bold;
        }

        .detection-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detection-value {
            font-size: 24px;
            color: var(--primary);
            font-family: monospace;
        }

        .coords {
            color: var(--info);
            font-family: monospace;
            font-size: 16px;
            margin-top: 5px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        input,
        select {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }

        button:active {
            opacity: 0.6;
        }

        .btn-start {
            background: var(--primary);
            color: #000;
        }

        .btn-stop {
            background: var(--danger);
        }

        .btn-clear {
            background: #444;
        }

        .btn-export {
            background: var(--info);
        }

        .btn-origin {
            background: #6b4c9a;
        }

        #roi-guide {
            position: absolute;
            top: 30%;
            left: 20%;
            width: 60%;
            height: 30%;
            border: 2px dashed var(--primary);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 5;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <video id="video-preview" autoplay playsinline muted></video>
    <div id="roi-guide"></div>
    <canvas id="proc-canvas" class="hidden"></canvas>

    <div class="overlay">
        <div class="status-row">
            <div>
                <div class="status-label">Recording Status</div>
                <div id="recording-status" class="status-value">STOPPED</div>
            </div>
            <div style="text-align: right;">
                <div class="status-label">Sensors</div>
                <div id="sensor-status" class="status-value" style="color: var(--danger); font-size: 14px;">OFF</div>
            </div>
        </div>
        <button class="btn-origin" id="btn-set-origin" style="width: 100%; margin-top: 5px;">RESET ORIGIN (ZERO GYRO)</button>

        <div class="detection-card">
            <div class="status-label">Live Detection</div>
            <div id="detection-result" class="detection-value">WAITING...</div>
            <div id="coord-display" class="coords">X: 0.00, Y: 0.00</div>
        </div>

        <div class="controls">
            <input type="text" id="agv-id" value="AGV_01" placeholder="AGV ID">
            <select id="interval-select">
                <option value="1000">Interval: 1s</option>
                <option value="2000">Interval: 2s</option>
                <option value="5000">Interval: 5s</option>
                <option value="10000">Interval: 10s</option>
            </select>
            <button class="btn-start" id="btn-start">START</button>
            <button class="btn-stop" id="btn-stop">STOP</button>
            <button class="btn-clear" id="btn-clear">CLEAR DATA</button>
            <button class="btn-export" id="btn-export">EXPORT CSV</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('proc-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const recordingStatus = document.getElementById('recording-status');
        const sensorStatus = document.getElementById('sensor-status');
        const detectionResult = document.getElementById('detection-result');
        const coordDisplay = document.getElementById('coord-display');

        let isRecording = false;
        let lastLogTime = 0;
        let lastFrameTime = 0;
        let lastFrameData = null;
        let logs = [];

        // Coords Tracking
        let curX = 0, curY = 0, velX = 0, velY = 0;
        let lastMotionTime = Date.now();
        let sensorActive = false;

        // Config
        const ROI_RECT = { x: 0.2, y: 0.3, w: 0.6, h: 0.3 };
        const PIXEL_DIFF_THRESHOLD = 35;
        const CHANGE_RATIO_THRESHOLD = 0.30;
        const ACCEL_DEADZONE = 0.10; // Slightly lower for better sensitivity
        const VELOCITY_DAMPING = 0.97; // Keep momentum a bit longer

        let lastAvgGray = -1;
        let isLoadedState = false;
        let currentStdDev = 0;

        // Thresholds for Texture Detection
        const SD_EMPTY_THRESHOLD = 18;
        const SD_LOADED_THRESHOLD = 10;

        // Start Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 1280, height: 720 },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(mainLoop);
                };
            } catch (err) {
                alert("Cannot access camera: " + err.message);
                console.error(err);
            }
        }

        // Motion Tracking (Needs user gesture for iOS 13+)
        function initMotion() {
            if (sensorActive) return;

            const handleMotionWrapper = (e) => {
                handleMotion(e);
                sensorActive = true;
            };

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotionWrapper);
                        } else {
                            alert("Sensor Permission Denied.");
                        }
                    })
                    .catch(e => {
                        console.error("Motion Permission Error:", e);
                    });
            } else {
                window.addEventListener('devicemotion', handleMotionWrapper);
            }
        }

        function handleMotion(event) {
            const now = Date.now();
            const dt = (now - lastMotionTime) / 1000;
            lastMotionTime = now;

            // Prefer linear acceleration (exclude gravity)
            let accel = event.acceleration;
            
            // Fallback to accelerationIncludingGravity if linear is not available
            // Note: This will drift heavily if the device is not flat, but at least shows movement
            if (!accel || accel.x === null) {
                accel = event.accelerationIncludingGravity;
            }

            if (!accel || accel.x === null) {
                return;
            }

            // Sensor is working
            sensorStatus.innerText = "ACTIVE";
            sensorStatus.style.color = "var(--primary)";

            // Extract values
            let ax_raw = accel.y || 0;
            let ay_raw = accel.x || 0;

            // Apply deadzone
            const ax = Math.abs(ax_raw) > ACCEL_DEADZONE ? ax_raw : 0;
            const ay = Math.abs(ay_raw) > ACCEL_DEADZONE ? ay_raw : 0;

            // Simple integration: v = u + at
            velX = (velX + ax * dt) * VELOCITY_DAMPING;
            velY = (velY + ay * dt) * VELOCITY_DAMPING;

            // Position: s = s0 + vt
            curX += velX * dt;
            curY += velY * dt;

            // Lock jittery velocity to zero
            if (Math.abs(velX) < 0.005) velX = 0;
            if (Math.abs(velY) < 0.005) velY = 0;
        }

        // Processing Logic
        function processFrame() {
            if (!video.videoWidth || video.paused) return;

            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
            ctx.drawImage(video, 0, 0);

            const x = ROI_RECT.x * canvas.width;
            const y = ROI_RECT.y * canvas.height;
            const w = ROI_RECT.w * canvas.width;
            const h = ROI_RECT.h * canvas.height;

            const imageData = ctx.getImageData(x, y, w, h);
            const pixels = imageData.data;

            let totalGray = 0;
            let totalGraySq = 0;
            const pixelCount = w * h;
            const grayPixels = new Uint8Array(pixelCount);

            for (let i = 0; i < pixels.length; i += 4) {
                const g = pixels[i] * 0.3 + pixels[i + 1] * 0.59 + pixels[i + 2] * 0.11;
                grayPixels[i / 4] = g;
                totalGray += g;
                totalGraySq += g * g;
            }

            const currentAvgGray = totalGray / pixelCount;
            const variance = (totalGraySq / pixelCount) - (currentAvgGray * currentAvgGray);
            currentStdDev = Math.sqrt(Math.max(0, variance));

            // State Logic
            if (currentStdDev < SD_LOADED_THRESHOLD) {
                isLoadedState = true;
            } else if (currentStdDev > SD_EMPTY_THRESHOLD) {
                isLoadedState = false;
            }

            // Jump Detection
            if (lastAvgGray !== -1) {
                const jump = Math.abs(currentAvgGray - lastAvgGray);
                if (jump > (255 * CHANGE_RATIO_THRESHOLD)) {
                    isLoadedState = !isLoadedState;
                }
            }

            // Update Prediction UI
            const statusText = isLoadedState ? 'LOADED' : 'EMPTY';
            detectionResult.innerText = statusText;
            detectionResult.style.color = isLoadedState ? 'var(--primary)' : '#ffcc00';

            // Logging
            if (isRecording) {
                const now = Date.now();
                const interval = parseInt(document.getElementById('interval-select').value);
                if (now - lastLogTime >= interval) {
                    logs.push({
                        time: new Date().toISOString(),
                        id: document.getElementById('agv-id').value,
                        status: isLoadedState ? 1 : 0,
                        avg_gray: currentAvgGray.toFixed(1),
                        std_dev: currentStdDev.toFixed(1),
                        x: curX.toFixed(4),
                        y: curY.toFixed(4)
                    });
                    lastLogTime = now;
                }
            }

            lastAvgGray = currentAvgGray;
            lastFrameData = grayPixels;
        }

        // Main Loop for UI and High-Freq Updates
        function mainLoop(timestamp) {
            // Update Coords UI at maximum frame rate
            coordDisplay.innerHTML = `X: ${curX.toFixed(2)}, Y: ${curY.toFixed(2)} | SD: ${currentStdDev.toFixed(1)}`;

            // Process detection at a fixed rate (approx 10 FPS) for visual feedback
            if (timestamp - lastFrameTime > 100) {
                processFrame();
                lastFrameTime = timestamp;
            }

            requestAnimationFrame(mainLoop);
        }

        // Controls
        document.getElementById('btn-start').onclick = () => {
            initMotion();
            isRecording = true;
            lastLogTime = 0; // Trigger immediate first log
            recordingStatus.innerText = "RECORDING";
            recordingStatus.style.color = "var(--primary)";
        };

        document.getElementById('btn-stop').onclick = () => {
            isRecording = false;
            recordingStatus.innerText = "STOPPED";
            recordingStatus.style.color = "#fff";
        };

        document.getElementById('btn-set-origin').onclick = () => {
            curX = 0; curY = 0; velX = 0; velY = 0;
            alert("Coordinates Reset.");
        };

        document.getElementById('btn-clear').onclick = () => {
            logs = [];
            alert("Logs cleared");
        };

        document.getElementById('btn-export').onclick = () => {
            if (logs.length === 0) { alert("No data to export"); return; }
            let csv = "timestamp_iso8601,agv_id,load_flag,avg_gray,std_dev,coord_x,coord_y\n";
            logs.forEach(l => {
                csv += `${l.time},${l.id},${l.status},${l.avg_gray},${l.std_dev},${l.x},${l.y}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `agv_log_${Date.now()}.csv`;
            a.click();
        };

        initCamera();
    </script>
</body>

</html>
